name: CI

on:
  push:
    branches: master
  pull_request:
    branches: master
  workflow_dispatch:


jobs:
  ci:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: amd64
          - os: ubuntu-22.04-arm
            platform: arm64
    runs-on: ${{matrix.os}}
    timeout-minutes: 30
    steps:

      - name: Set up dependencies
        run: |
          sudo add-apt-repository ppa:flatpak/stable
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends flatpak

      - name: Print flatpak arches
        run: flatpak --default-arch

      - name: Print flatpak arches
        run: uname -m
